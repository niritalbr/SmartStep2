services:
  - type: web
    name: smartstep2
    runtime: node
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install --include=dev && npm run build && npx prisma db push
    startCommand: cd server && node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: ""
